name: Build Static Pages & Sitemap

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  
  # Runs on manually push to main branch
  push:
    branches:
      - main
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  build-ssg:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 🏗️ Run Static Site Generator
        run: node build-pages.js
      
      - name: 📤 Commit and Push Static Files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add sitemap.xml jobs/ quiz/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-build static HTML pages & sitemap [skip ci]" && git push)